<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E9F4FB"/>
      <stop offset="0.55" stop-color="#FFF7EC"/>
      <stop offset="1" stop-color="#EAD9BD"/>
    </linearGradient>
    <radialGradient id="sSpace" cx="0.5" cy="0.45" r="0.62">
      <stop offset="0" stop-color="#15305C"/>
      <stop offset="0.7" stop-color="#0B1C3A"/>
      <stop offset="1" stop-color="#060F22"/>
    </radialGradient>
    <radialGradient id="sEarth" cx="0.4" cy="0.38" r="0.7">
      <stop offset="0" stop-color="#7FC9F5"/>
      <stop offset="0.6" stop-color="#3E86C9"/>
      <stop offset="1" stop-color="#1E4F86"/>
    </radialGradient>
    <radialGradient id="sCyan" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#9BE8FF" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#9BE8FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#D7E6F2"/>
    </linearGradient>
    <linearGradient id="sPod" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EAF7FF"/>
      <stop offset="1" stop-color="#BFE4F5"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#sWall)"/>

  <!-- subtle paneling on the interior walls -->
  <g stroke="#C9DCEC" stroke-width="3" opacity="0.6">
    <line x1="0" y1="150" x2="1600" y2="150"/>
    <line x1="0" y1="760" x2="1600" y2="760"/>
    <line x1="260" y1="0" x2="260" y2="900"/>
    <line x1="1340" y1="0" x2="1340" y2="900"/>
  </g>
  <rect x="0" y="0" width="1600" height="60" fill="#DCEAF6" opacity="0.7"/>
  <rect x="0" y="840" width="1600" height="60" fill="#E2D2B6" opacity="0.6"/>

  <!-- huge round observation window -->
  <g transform="translate(800 430)">
    <circle r="370" fill="#FFFFFF"/>
    <circle r="356" fill="url(#sSpace)"/>
    <!-- stars -->
    <g fill="#FFFFFF">
      <circle cx="-250" cy="-180" r="3"/>
      <circle cx="-180" cy="-240" r="2"/>
      <circle cx="-90" cy="-280" r="2.5"/>
      <circle cx="60" cy="-270" r="2"/>
      <circle cx="190" cy="-220" r="3"/>
      <circle cx="270" cy="-120" r="2"/>
      <circle cx="300" cy="40" r="2.5"/>
      <circle cx="250" cy="180" r="2"/>
      <circle cx="-280" cy="80" r="2.5"/>
      <circle cx="-300" cy="-40" r="2"/>
      <circle cx="-160" cy="240" r="2"/>
      <circle cx="40" cy="280" r="2.5"/>
      <circle cx="170" cy="250" r="2"/>
      <circle cx="-60" cy="-160" r="1.6"/>
      <circle cx="120" cy="-120" r="1.6"/>
      <circle cx="-220" cy="-90" r="1.6"/>
    </g>
    <!-- Earth -->
    <g transform="translate(70 110)">
      <circle r="170" fill="url(#sEarth)"/>
      <g fill="#6FBF7A" opacity="0.85">
        <path d="M-110 -40 q40 -30 90 -10 q30 14 10 44 q-30 26 -80 14 q-40 -12 -20 -48 Z"/>
        <path d="M30 30 q50 -10 80 26 q14 30 -22 46 q-44 14 -70 -18 q-18 -34 12 -54 Z"/>
        <path d="M-60 70 q34 -6 50 22 q6 22 -22 30 q-34 6 -44 -20 q-4 -24 16 -32 Z"/>
      </g>
      <circle r="170" fill="#9BE8FF" opacity="0.16"/>
      <ellipse cx="-55" cy="-58" rx="64" ry="42" fill="#FFFFFF" opacity="0.22"/>
    </g>
    <!-- window cross frame -->
    <g stroke="#FFFFFF" stroke-width="12" opacity="0.85">
      <line x1="-356" y1="0" x2="356" y2="0"/>
      <line x1="0" y1="-356" x2="0" y2="356"/>
    </g>
    <circle r="356" fill="none" stroke="#BFE4F5" stroke-width="10" opacity="0.6"/>
    <circle r="370" fill="none" stroke="#FFFFFF" stroke-width="14"/>
    <circle r="386" fill="url(#sCyan)" opacity="0.5"/>
  </g>

  <!-- floating food display pods (rounded capsules with domes) -->
  <g>
    <g transform="translate(250 360)">
      <ellipse cx="0" cy="78" rx="64" ry="12" fill="#9BE8FF" opacity="0.25"/>
      <rect x="-58" y="20" width="116" height="60" rx="20" fill="url(#sPanel)"/>
      <path d="M-58 50 a58 40 0 0 1 116 0 Z" fill="url(#sPod)" opacity="0.95"/>
      <circle cx="0" cy="38" r="20" fill="#F2994A"/>
      <circle cx="0" cy="38" r="20" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.7"/>
    </g>
    <g transform="translate(1360 330)">
      <ellipse cx="0" cy="84" rx="70" ry="13" fill="#9BE8FF" opacity="0.25"/>
      <rect x="-64" y="20" width="128" height="66" rx="22" fill="url(#sPanel)"/>
      <path d="M-64 52 a64 44 0 0 1 128 0 Z" fill="url(#sPod)" opacity="0.95"/>
      <circle cx="0" cy="40" r="22" fill="#F2C062"/>
      <circle cx="0" cy="40" r="22" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.7"/>
    </g>
    <g transform="translate(180 620)">
      <ellipse cx="0" cy="58" rx="50" ry="10" fill="#9BE8FF" opacity="0.22"/>
      <rect x="-46" y="14" width="92" height="46" rx="16" fill="url(#sPanel)"/>
      <path d="M-46 36 a46 30 0 0 1 92 0 Z" fill="url(#sPod)" opacity="0.95"/>
      <circle cx="0" cy="28" r="15" fill="#F2994A"/>
    </g>
    <g transform="translate(1420 640)">
      <ellipse cx="0" cy="58" rx="50" ry="10" fill="#9BE8FF" opacity="0.22"/>
      <rect x="-46" y="14" width="92" height="46" rx="16" fill="url(#sPanel)"/>
      <path d="M-46 36 a46 30 0 0 1 92 0 Z" fill="url(#sPod)" opacity="0.95"/>
      <circle cx="0" cy="28" r="15" fill="#F2C062"/>
    </g>
  </g>

  <!-- station deck floor, calm center -->
  <rect x="0" y="780" width="1600" height="120" fill="#EAD9BD"/>
  <path d="M0 780 L1600 780 L1600 800 L0 800 Z" fill="#FFFFFF" opacity="0.4"/>
  <g stroke="#FFFFFF" stroke-width="3" opacity="0.3">
    <line x1="800" y1="800" x2="520" y2="900"/>
    <line x1="800" y1="800" x2="1080" y2="900"/>
  </g>
  <ellipse cx="800" cy="820" rx="300" ry="30" fill="#9BE8FF" opacity="0.18"/>
</svg>
