<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="cvWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eafaff"/>
      <stop offset="0.55" stop-color="#dff3fb"/>
      <stop offset="1" stop-color="#cfe9f3"/>
    </linearGradient>
    <linearGradient id="cvFloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e9eef2"/>
      <stop offset="1" stop-color="#d4dde3"/>
    </linearGradient>
    <linearGradient id="cvFridge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dff6ff"/>
      <stop offset="1" stop-color="#b9e4f2"/>
    </linearGradient>
    <linearGradient id="cvCounter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f2994a"/>
      <stop offset="1" stop-color="#e07b39"/>
    </linearGradient>
  </defs>

  <!-- wall + ceiling -->
  <rect width="1600" height="900" fill="url(#cvWall)"/>
  <!-- ceiling band with light panels -->
  <rect x="0" y="0" width="1600" height="120" fill="#f4fbff"/>
  <g fill="#ffffff" opacity="0.9">
    <rect x="120" y="34" width="260" height="40" rx="20"/>
    <rect x="520" y="34" width="260" height="40" rx="20"/>
    <rect x="920" y="34" width="260" height="40" rx="20"/>
    <rect x="1320" y="34" width="200" height="40" rx="20"/>
  </g>
  <!-- soft daylight bokeh -->
  <g fill="#bfe9fb" opacity="0.4">
    <circle cx="300" cy="200" r="120"/>
    <circle cx="1280" cy="180" r="140"/>
  </g>

  <!-- store signage band -->
  <rect x="0" y="120" width="1600" height="70" fill="#56c2e6"/>
  <rect x="0" y="184" width="1600" height="8" fill="#2f9fc7"/>
  <g fill="#eafaff" opacity="0.85">
    <rect x="80" y="142" width="120" height="26" rx="13"/>
    <rect x="230" y="142" width="70" height="26" rx="13"/>
