<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="ckWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5b3f2e"/>
      <stop offset="0.55" stop-color="#7a543a"/>
      <stop offset="1" stop-color="#8f6442"/>
    </linearGradient>
    <linearGradient id="ckFloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6e4a32"/>
      <stop offset="1" stop-color="#563926"/>
    </linearGradient>
    <linearGradient id="ckTable" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#caa46a"/>
      <stop offset="1" stop-color="#a87b48"/>
    </linearGradient>
    <radialGradient id="ckLamp" cx="0.5" cy="0.35" r="0.65">
      <stop offset="0" stop-color="#fff0c8"/>
      <stop offset="1" stop-color="#f2a84a"/>
    </radialGradient>
    <radialGradient id="ckPool" cx="0.5" cy="0.0" r="1">
      <stop offset="0" stop-color="#ffd98f" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffd98f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- warm wall -->
  <rect width="1600" height="900" fill="url(#ckWall)"/>
  <!-- wood plank wall seams -->
  <g stroke="#5b3f2e" stroke-width="4" opacity="0.4">
    <line x1="0" y1="150" x2="1600" y2="150"/>
    <line x1="0" y1="320" x2="1600" y2="320"/>
    <line x1="0" y1="490" x2="1600" y2="490"/>
  </g>
  <g stroke="#5b3f2e" stroke-width="3" opacity="0.25">
    <line x1="260" y1="0" x2="260" y2="560"/>
    <line x1="640" y1="0" x2="640" y2="560"/>
    <line x1="1000" y1="0" x2="1000" y2="560"/>
    <line x1="1360" y1="0" x2="1360" y2="560"/>
  </g>

  <!-- floor -->
  <rect x="0" y="640" width="1600" height="260" fill="url(#ckFloor)"/>
  <rect x="0" y="640" width="1600" height="10" fill="#3f2819"/>

  <!-- chalkboard menu on wall (left) -->
  <g>
    <rect x="120" y="150" width="320" height="240" rx="14" fill="#7a543a"/>
    <rect x="138" y="168" width="284" height="204" rx="8" fill="#2f3b33"/>
    <!-- chalk lines -->
    <g stroke="#e7d9c0" stroke-width="6" opacity="0.6" stroke-linecap="round">
      <line x1="168" y1="206" x2="360" y2="206"/>
      <line x1="168" y1="244" x2="392" y2="244"/>
      <line x1="168" y1="282" x2="330" y2="282"/>
      <line x1="168" y1="320" x2="372" y2="320"/>
    </g>
    <g stroke="#f2c94c" stroke-width="6" opacity="0.5" stroke-linecap="round">
      <line x1="168" y1="338" x2="280" y2="338"/>
    </g>
  </g>

  <!-- framed picture / window (right) -->
  <g>
    <rect x="1160" y="160" width="320" height="230" rx="12" fill="#5b3f2e"/>
    <rect x="1178" y="178" width="284" height="194" rx="8" fill="#9c6a44"/>
    <ellipse cx="1320" cy="300" rx="120" ry="60" fill="#caa46a" opacity="0.55"/>
    <circle cx="1390" cy="230" r="34" fill="#ffe6a8" opacity="0.7"/>
  </g>

  <!-- hanging warm lamps -->
  <g>
    <line x1="500" y1="0" x2="500" y2="120" stroke="#3f2819" stroke-width="5"/>
    <path d="M448 120 h104 l-18 64 h-68 z" fill="#3a2c20"/>
    <ellipse cx="500" cy="190" rx="46" ry="20" fill="url(#ckLamp)"/>
    <ellipse cx="500" cy="250" rx="150" ry="120" fill="url(#ckPool)"/>
  </g>
  <g>
    <line x1="950" y1="0" x2="950" y2="100" stroke="#3f2819" stroke-width="5"/>
    <path d="M898 100 h104 l-18 64 h-68 z" fill="#3a2c20"/>
    <ellipse cx="950" cy="170" rx="46" ry="20" fill="url(#ckLamp)"/>
    <ellipse cx="950" cy="230" rx="150" ry="120" fill="url(#ckPool)"/>
  </g>

  <!-- back counter / bar with taps -->
  <g>
    <rect x="560" y="470" width="540" height="170" rx="12" fill="#6e4a32"/>
    <rect x="560" y="470" width="540" height="22" rx="11" fill="#caa46a"/>
    <rect x="560" y="470" width="540" height="8" rx="4" fill="#ffd9a0" opacity="0.5"/>
    <!-- beer taps -->
    <g fill="#cdd8df">
      <rect x="640" y="426" width="14" height="50" rx="6"/>
      <rect x="700" y="426" width="14" height="50" rx="6"/>
      <rect x="760" y="426" width="14" height="50" rx="6"/>
    </g>
    <g fill="#f2994a">
      <circle cx="647" cy="420" r="12"/>
      <circle cx="707" cy="420" r="12"/>
      <circle cx="767" cy="420" r="12"/>
    </g>
    <!-- bottles on back counter -->
    <g>
      <rect x="900" y="420" width="20" height="56" rx="6" fill="#5bbf7a"/>
      <rect x="930" y="412" width="20" height="64" rx="6" fill="#caa46a"/>
      <rect x="960" y="424" width="20" height="52" rx="6" fill="#5bbf7a"/>
      <rect x="990" y="416" width="20" height="60" rx="6" fill="#c9622b"/>
      <rect x="1020" y="424" width="20" height="52" rx="6" fill="#5bbf7a"/>
    </g>
  </g>

  <!-- wooden tables with chicken & beer (foreground, center kept lower/calm) -->
  <!-- left table -->
  <g>
    <ellipse cx="360" cy="800" rx="40" ry="12" fill="#000000" opacity="0.18"/>
    <rect x="200" y="690" width="320" height="40" rx="14" fill="url(#ckTable)"/>
    <rect x="200" y="690" width="320" height="10" rx="5" fill="#ffe6b0" opacity="0.4"/>
    <rect x="320" y="730" width="20" height="70" rx="6" fill="#7a543a"/>
    <!-- plate of fried chicken -->
    <ellipse cx="300" cy="688" rx="70" ry="20" fill="#fff7ec"/>
    <g fill="#e0913e">
      <circle cx="276" cy="678" r="20"/>
      <circle cx="310" cy="682" r="22"/>
      <circle cx="298" cy="668" r="18"/>
      <circle cx="330" cy="674" r="17"/>
    </g>
    <g fill="#f2b362" opacity="0.7">
      <circle cx="280" cy="672" r="7"/>
      <circle cx="312" cy="676" r="7"/>
      <circle cx="326" cy="670" r="6"/>
    </g>
    <!-- beer glass -->
    <g>
      <path d="M420 654 h44 l-6 60 h-32 z" fill="#f2b134" opacity="0.85"/>
      <rect x="416" y="646" width="52" height="14" rx="7" fill="#fff7ec"/>
    </g>
  </g>

  <!-- right table -->
  <g>
    <ellipse cx="1240" cy="820" rx="44" ry="13" fill="#000000" opacity="0.18"/>
    <rect x="1080" y="700" width="320" height="40" rx="14" fill="url(#ckTable)"/>
    <rect x="1080" y="700" width="320" height="10" rx="5" fill="#ffe6b0" opacity="0.4"/>
    <rect x="1200" y="740" width="20" height="80" rx="6" fill="#7a543a"/>
    <!-- basket of chicken -->
    <path d="M1110 670 h130 l-12 30 h-106 z" fill="#9c6a44"/>
    <ellipse cx="1175" cy="668" rx="68" ry="18" fill="#b5824f"/>
    <g fill="#e0913e">
      <circle cx="1150" cy="660" r="19"/>
      <circle cx="1185" cy="662" r="21"/>
      <circle cx="1172" cy="650" r="17"/>
      <circle cx="1205" cy="656" r="16"/>
    </g>
    <!-- two beer glasses -->
    <g>
      <path d="M1300 664 h40 l-6 54 h-28 z" fill="#f2b134" opacity="0.85"/>
      <rect x="1296" y="656" width="48" height="13" rx="6" fill="#fff7ec"/>
      <path d="M1352 668 h36 l-5 50 h-26 z" fill="#f2b134" opacity="0.8"/>
      <rect x="1348" y="660" width="44" height="12" rx="6" fill="#fff7ec"/>
    </g>
  </g>

  <!-- warm ambient floor glow, center calm -->
  <ellipse cx="800" cy="760" rx="520" ry="40" fill="#ffd98f" opacity="0.1"/>
</svg>
