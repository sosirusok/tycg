<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="kNebula" cx="0.5" cy="0.4" r="0.85">
      <stop offset="0" stop-color="#5B3F8F"/>
      <stop offset="0.45" stop-color="#3A2766"/>
      <stop offset="0.8" stop-color="#231546"/>
      <stop offset="1" stop-color="#160C30"/>
    </radialGradient>
    <radialGradient id="kCore" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFF7EC"/>
      <stop offset="0.3" stop-color="#FFE3B0"/>
      <stop offset="0.65" stop-color="#F2994A" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#F2994A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="kPink" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#E893C9" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#E893C9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="kCyanCloud" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7FD6F0" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#7FD6F0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="kPlatter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF3D8"/>
      <stop offset="1" stop-color="#F2C062"/>
    </linearGradient>
    <linearGradient id="kRing" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C9A4F0"/>
      <stop offset="0.5" stop-color="#FFE3B0"/>
      <stop offset="1" stop-color="#7FD6F0"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#kNebula)"/>

  <!-- nebula colour clouds -->
  <ellipse cx="380" cy="280" rx="520" ry="360" fill="url(#kPink)"/>
  <ellipse cx="1280" cy="240" rx="520" ry="340" fill="url(#kCyanCloud)"/>
  <ellipse cx="800" cy="640" rx="640" ry="260" fill="url(#kPink)" opacity="0.5"/>

  <!-- starfield -->
  <g fill="#FFFFFF">
    <circle cx="120" cy="120" r="2.5"/><circle cx="240" cy="80" r="1.8"/>
    <circle cx="360" cy="160" r="2"/><circle cx="520" cy="90" r="2.6"/>
    <circle cx="680" cy="150" r="1.8"/><circle cx="900" cy="100" r="2.4"/>
    <circle cx="1080" cy="70" r="1.8"/><circle cx="1240" cy="140" r="2.6"/>
    <circle cx="1420" cy="90" r="2"/><circle cx="1520" cy="200" r="2.4"/>
    <circle cx="80" cy="300" r="2"/><circle cx="200" cy="430" r="1.8"/>
    <circle cx="1500" cy="380" r="2.2"/><circle cx="1400" cy="500" r="1.8"/>
    <circle cx="60" cy="560" r="2.2"/><circle cx="150" cy="700" r="1.8"/>
    <circle cx="1540" cy="640" r="2"/><circle cx="1460" cy="780" r="1.8"/>
    <circle cx="300" cy="820" r="2.2"/><circle cx="1280" cy="840" r="1.8"/>
    <circle cx="760" cy="60" r="1.6"/><circle cx="1160" cy="220" r="1.6"/>
    <circle cx="440" cy="350" r="1.6"/><circle cx="1330" cy="300" r="1.6"/>
  </g>
  <!-- sparkle stars -->
  <g fill="#FFE3B0" opacity="0.9">
    <path d="M250 250 l4 14 l14 4 l-14 4 l-4 14 l-4 -14 l-14 -4 l14 -4 Z"/>
    <path d="M1330 200 l3 11 l11 3 l-11 3 l-3 11 l-3 -11 l-11 -3 l11 -3 Z"/>
    <path d="M1120 420 l3 11 l11 3 l-11 3 l-3 11 l-3 -11 l-11 -3 l11 -3 Z"/>
    <path d="M470 540 l3 10 l10 3 l-10 3 l-3 10 l-3 -10 l-10 -3 l10 -3 Z"/>
  </g>

  <!-- luminous center -->
  <ellipse cx="800" cy="400" rx="560" ry="460" fill="url(#kCore)"/>
  <circle cx="800" cy="380" r="70" fill="#FFF7EC" opacity="0.9"/>
  <circle cx="800" cy="380" r="70" fill="none" stroke="#FFE3B0" stroke-width="10" opacity="0.6"/>

  <!-- glowing orbital rings -->
  <g fill="none" opacity="0.85">
    <ellipse cx="800" cy="380" rx="300" ry="90" stroke="url(#kRing)" stroke-width="6" transform="rotate(-14 800 380)"/>
    <ellipse cx="800" cy="380" rx="430" ry="130" stroke="url(#kRing)" stroke-width="5" opacity="0.7" transform="rotate(-14 800 380)"/>
    <ellipse cx="800" cy="380" rx="200" ry="58" stroke="#FFE3B0" stroke-width="4" opacity="0.7" transform="rotate(8 800 380)"/>
  </g>

  <!-- floating glowing platters (domed dishes drifting in the realm) -->
  <g>
    <g transform="translate(360 360)">
      <ellipse cx="0" cy="6" rx="92" ry="26" fill="#C9A4F0" opacity="0.4"/>
      <ellipse cx="0" cy="0" rx="92" ry="22" fill="url(#kPlatter)"/>
      <path d="M-72 -2 a72 50 0 0 1 144 0 Z" fill="#FFF3D8" opacity="0.92"/>
      <circle cx="0" cy="-44" r="9" fill="#FFFFFF"/>
      <circle cx="0" cy="-12" r="20" fill="#F2994A" opacity="0.55"/>
    </g>
    <g transform="translate(1230 350)">
      <ellipse cx="0" cy="6" rx="104" ry="28" fill="#7FD6F0" opacity="0.4"/>
      <ellipse cx="0" cy="0" rx="104" ry="24" fill="url(#kPlatter)"/>
      <path d="M-82 -2 a82 56 0 0 1 164 0 Z" fill="#FFF3D8" opacity="0.92"/>
      <circle cx="0" cy="-50" r="10" fill="#FFFFFF"/>
      <circle cx="0" cy="-14" r="22" fill="#E893C9" opacity="0.5"/>
    </g>
    <g transform="translate(560 600)">
      <ellipse cx="0" cy="5" rx="74" ry="20" fill="#C9A4F0" opacity="0.35"/>
      <ellipse cx="0" cy="0" rx="74" ry="17" fill="url(#kPlatter)"/>
      <path d="M-58 -1 a58 40 0 0 1 116 0 Z" fill="#FFF3D8" opacity="0.9"/>
      <circle cx="0" cy="-34" r="7" fill="#FFFFFF"/>
    </g>
    <g transform="translate(1060 620)">
      <ellipse cx="0" cy="5" rx="74" ry="20" fill="#7FD6F0" opacity="0.35"/>
      <ellipse cx="0" cy="0" rx="74" ry="17" fill="url(#kPlatter)"/>
      <path d="M-58 -1 a58 40 0 0 1 116 0 Z" fill="#FFF3D8" opacity="0.9"/>
      <circle cx="0" cy="-34" r="7" fill="#FFFFFF"/>
    </g>
  </g>

  <!-- small floating orbs near center -->
  <g>
    <circle cx="640" cy="300" r="14" fill="#FFE3B0" opacity="0.85"/>
    <circle cx="980" cy="300" r="12" fill="#C9A4F0" opacity="0.8"/>
    <circle cx="900" cy="470" r="10" fill="#7FD6F0" opacity="0.8"/>
    <circle cx="700" cy="480" r="9" fill="#E893C9" opacity="0.8"/>
  </g>

  <!-- calm lower mist for UI overlay -->
  <ellipse cx="800" cy="900" rx="900" ry="260" fill="#160C30" opacity="0.55"/>
  <ellipse cx="800" cy="820" rx="520" ry="120" fill="#C9A4F0" opacity="0.12"/>
</svg>
