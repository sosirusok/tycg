<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="snEve" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2c3e"/>
      <stop offset="0.5" stop-color="#5a3b3a"/>
      <stop offset="1" stop-color="#7a4a32"/>
    </linearGradient>
    <radialGradient id="snGlow" cx="0.5" cy="0.62" r="0.62">
      <stop offset="0" stop-color="#ffcf87" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#ffcf87" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="snCart" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f2994a"/>
      <stop offset="1" stop-color="#c9622b"/>
    </linearGradient>
    <radialGradient id="snBulb" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#fff3cf"/>
      <stop offset="1" stop-color="#ffbf5e"/>
    </radialGradient>
  </defs>

  <!-- evening sky / backdrop -->
  <rect width="1600" height="900" fill="url(#snEve)"/>
  <rect width="1600" height="900" fill="url(#snGlow)"/>

  <!-- distant city dusk silhouette -->
  <g fill="#4a3340" opacity="0.55">
    <rect x="60" y="300" width="120" height="260" rx="6"/>
    <rect x="200" y="350" width="90" height="210" rx="6"/>
    <rect x="1320" y="320" width="110" height="240" rx="6"/>
    <rect x="1440" y="360" width="100" height="200" rx="6"/>
  </g>
  <g fill="#ffd98f" opacity="0.5">
    <rect x="84" y="330" width="18" height="22" rx="3"/>
    <rect x="120" y="330" width="18" height="22" rx="3"/>
    <rect x="84" y="380" width="18" height="22" rx="3"/>
    <rect x="1356" y="350" width="18" height="22" rx="3"/>
    <rect x="1392" y="350" width="18" height="22" rx="3"/>
    <rect x="1466" y="392" width="16" height="20" rx="3"/>
  </g>

  <!-- ground -->
  <rect x="0" y="720" width="1600" height="180" fill="#5e3b2c"/>
  <rect x="0" y="720" width="1600" height="10" fill="#3f281e"/>

  <!-- TENT structure -->
  <!-- back canvas wall -->
  <rect x="210" y="250" width="1180" height="480" rx="10" fill="#6e3a33"/>
  <rect x="210" y="250" width="1180" height="480" rx="10" fill="#000000" opacity="0.12"/>

  <!-- tent poles -->
  <g fill="#3f281e">
    <rect x="230" y="180" width="20" height="560" rx="6"/>
    <rect x="1350" y="180" width="20" height="560" rx="6"/>
  </g>

  <!-- red & cream striped awning -->
  <g>
    <path d="M170 200 L1430 200 L1470 300 L130 300 Z" fill="#d94f4f"/>
    <!-- scalloped lower edge -->
    <g fill="#d94f4f">
      <path d="M130 300 h1340 v18 a36 36 0 0 1 -36 36 a36 36 0 0 1 -36 -36 a36 36 0 0 1 -36 36 a36 36 0 0 1 -36 -36 z"/>
    </g>
    <!-- cream stripes -->
    <g fill="#fff7ec" opacity="0.95">
      <path d="M300 200 L360 200 L388 300 L322 300 Z"/>
      <path d="M520 200 L580 200 L600 300 L538 300 Z"/>
      <path d="M740 200 L800 200 L812 300 L752 300 Z"/>
      <path d="M960 200 L1020 200 L1024 300 L968 300 Z"/>
      <path d="M1180 200 L1240 200 L1236 300 L1182 300 Z"/>
    </g>
    <!-- awning highlight -->
    <rect x="130" y="200" width="1340" height="14" fill="#ffffff" opacity="0.18"/>
    <!-- scalloped fringe -->
    <g fill="#c43d3d">
      <path d="M150 318 q30 44 60 0 q30 44 60 0 q30 44 60 0 q30 44 60 0 q30 44 60 0 q30 44 60 0 q30 44 60 0 q30 44 60 0 q30 44 60 0 q30 44 60 0 q30 44 60 0 q30 44 60 0 q30 44 60 0 q30 44 60 0 q30 44 60 0 q30 44 60 0 q30 44 60 0 q30 44 60 0 q30 44 60 0 q30 44 60 0 q30 44 60 0 l0 -18 l-1320 0 z"/>
    </g>
  </g>

  <!-- hanging warm bulbs on a wire -->
  <path d="M250 250 Q800 300 1350 250" stroke="#caa46a" stroke-width="3" fill="none" opacity="0.7"/>
  <g>
    <circle cx="360" cy="288" r="20" fill="url(#snBulb)"/>
    <circle cx="540" cy="300" r="20" fill="url(#snBulb)"/>
    <circle cx="720" cy="306" r="20" fill="url(#snBulb)"/>
    <circle cx="900" cy="306" r="20" fill="url(#snBulb)"/>
    <circle cx="1080" cy="300" r="20" fill="url(#snBulb)"/>
    <circle cx="1260" cy="288" r="20" fill="url(#snBulb)"/>
  </g>
  <g fill="#ffe8b0" opacity="0.35">
    <circle cx="360" cy="288" r="42"/>
    <circle cx="540" cy="300" r="42"/>
    <circle cx="720" cy="306" r="42"/>
    <circle cx="900" cy="306" r="42"/>
    <circle cx="1080" cy="300" r="42"/>
    <circle cx="1260" cy="288" r="42"/>
  </g>

  <!-- steaming food cart / counter -->
  <g>
    <!-- counter top -->
    <rect x="300" y="560" width="1000" height="40" rx="12" fill="#e7c79a"/>
    <!-- cart body -->
    <rect x="320" y="600" width="960" height="160" rx="14" fill="url(#snCart)"/>
    <rect x="320" y="600" width="960" height="18" rx="9" fill="#ffd9a0" opacity="0.45"/>
    <!-- cart panel seams -->
    <g stroke="#a8521f" stroke-width="4" opacity="0.5">
      <line x1="540" y1="614" x2="540" y2="752"/>
      <line x1="800" y1="614" x2="800" y2="752"/>
      <line x1="1060" y1="614" x2="1060" y2="752"/>
    </g>

    <!-- big simmering pots with steam -->
    <g>
      <ellipse cx="470" cy="560" rx="90" ry="22" fill="#3f281e"/>
      <rect x="392" y="500" width="156" height="62" rx="14" fill="#4a3026"/>
      <ellipse cx="470" cy="500" rx="78" ry="18" fill="#d94f4f"/>
      <ellipse cx="470" cy="500" rx="60" ry="12" fill="#e8704f"/>
    </g>
    <g>
      <ellipse cx="760" cy="560" rx="90" ry="22" fill="#3f281e"/>
      <rect x="682" y="500" width="156" height="62" rx="14" fill="#4a3026"/>
      <ellipse cx="760" cy="500" rx="78" ry="18" fill="#caa46a"/>
      <ellipse cx="760" cy="500" rx="60" ry="12" fill="#e7c79a"/>
    </g>

    <!-- bowls lined on the counter (right, calmer side) -->
    <g>
      <ellipse cx="1000" cy="556" rx="46" ry="16" fill="#fff7ec"/>
      <ellipse cx="1000" cy="552" rx="38" ry="11" fill="#f2c94c" opacity="0.8"/>
      <ellipse cx="1110" cy="556" rx="46" ry="16" fill="#fff7ec"/>
      <ellipse cx="1110" cy="552" rx="38" ry="11" fill="#e8704f" opacity="0.8"/>
      <ellipse cx="1220" cy="556" rx="46" ry="16" fill="#fff7ec"/>
      <ellipse cx="1220" cy="552" rx="38" ry="11" fill="#5bbf7a" opacity="0.8"/>
    </g>
  </g>

  <!-- rising steam -->
  <g stroke="#fff7ec" stroke-width="7" fill="none" opacity="0.3" stroke-linecap="round">
    <path d="M450 490 q-26 -40 6 -78 q26 -34 -2 -74"/>
    <path d="M490 488 q26 -40 -6 -78 q-22 -34 4 -70"/>
    <path d="M742 488 q-24 -40 6 -76 q24 -32 -2 -70"/>
    <path d="M780 488 q24 -40 -6 -76 q-20 -30 4 -64"/>
  </g>

  <!-- warm ground glow under cart -->
  <ellipse cx="800" cy="762" rx="560" ry="34" fill="#ffcf87" opacity="0.14"/>
</svg>
