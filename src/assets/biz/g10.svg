  <!-- windows -->
  <g fill="#6FA8DC" stroke="#5B463A" stroke-width="1.3">
    <rect x="32" y="36" width="9" height="9" rx="2"/>
    <rect x="43.5" y="36" width="9" height="9" rx="2"/>
    <rect x="55" y="36" width="9" height="9" rx="2"/>
    <rect x="32" y="49" width="9" height="9" rx="2"/>
    <rect x="43.5" y="49" width="9" height="9" rx="2"/>
