<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="reWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6e2230"/>
      <stop offset="0.5" stop-color="#7e2f3c"/>
      <stop offset="1" stop-color="#5a1c28"/>
    </linearGradient>
    <linearGradient id="reFloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5b463a"/>
      <stop offset="1" stop-color="#3f2f26"/>
    </linearGradient>
    <linearGradient id="reWin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe9c2"/>
      <stop offset="1" stop-color="#f4c98e"/>
    </linearGradient>
    <linearGradient id="reDrape" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a8323f"/>
      <stop offset="1" stop-color="#7e2330"/>
    </linearGradient>
    <radialGradient id="reChand" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#fff3d0"/>
      <stop offset="1" stop-color="#e7c074"/>
    </radialGradient>
    <radialGradient id="reSpot" cx="0.5" cy="0.0" r="1">
      <stop offset="0" stop-color="#ffe9b8" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#ffe9b8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- burgundy wall -->
  <rect width="1600" height="900" fill="url(#reWall)"/>
  <!-- wall paneling -->
  <g fill="#8a3543" opacity="0.4">
    <rect x="90" y="120" width="220" height="420" rx="10"/>
    <rect x="1290" y="120" width="220" height="420" rx="10"/>
  </g>
  <g fill="#5a1c28" opacity="0.5">
    <rect x="0" y="560" width="1600" height="80"/>
  </g>
  <!-- gold trim line -->
  <rect x="0" y="556" width="1600" height="6" fill="#e7c074" opacity="0.7"/>

  <!-- floor -->
  <rect x="0" y="640" width="1600" height="260" fill="url(#reFloor)"/>
  <rect x="0" y="640" width="1600" height="8" fill="#2f2219"/>
  <!-- floor sheen -->
  <ellipse cx="800" cy="760" rx="620" ry="60" fill="#ffe9b8" opacity="0.06"/>

  <!-- tall draped window (center-back) -->
  <g>
    <rect x="560" y="120" width="480" height="430" rx="14" fill="#5a1c28"/>
    <rect x="580" y="140" width="440" height="400" rx="8" fill="url(#reWin)"/>
    <!-- muntins -->
    <g stroke="#caa46a" stroke-width="8" opacity="0.7">
      <line x1="800" y1="140" x2="800" y2="540"/>
      <line x1="580" y1="320" x2="1020" y2="320"/>
    </g>
    <!-- soft light bloom -->
    <ellipse cx="800" cy="300" rx="200" ry="170" fill="#fff7e0" opacity="0.45"/>
    <!-- drapes -->
    <path d="M540 110 q40 220 10 440 q60 -20 80 -60 q-20 -200 6 -380 z" fill="url(#reDrape)"/>
    <path d="M1060 110 q-40 220 -10 440 q-60 -20 -80 -60 q20 -200 -6 -380 z" fill="url(#reDrape)"/>
    <!-- drape highlights -->
    <path d="M556 140 q24 200 4 380" stroke="#c4505d" stroke-width="6" fill="none" opacity="0.5"/>
    <path d="M1044 140 q-24 200 -4 380" stroke="#c4505d" stroke-width="6" fill="none" opacity="0.5"/>
    <!-- valance -->
    <path d="M540 110 h520 v40 q-130 50 -260 50 q-130 0 -260 -50 z" fill="#8a2433"/>
    <rect x="540" y="106" width="520" height="12" rx="6" fill="#e7c074"/>
  </g>

  <!-- chandelier (upper center) -->
  <g>
    <line x1="800" y1="0" x2="800" y2="70" stroke="#caa46a" stroke-width="4"/>
    <ellipse cx="800" cy="120" rx="150" ry="60" fill="#e7c074" opacity="0.2"/>
    <path d="M690 90 q110 70 220 0" stroke="#e7c074" stroke-width="6" fill="none"/>
    <path d="M710 70 q90 60 180 0" stroke="#e7c074" stroke-width="5" fill="none"/>
    <g fill="url(#reChand)">
      <circle cx="700" cy="96" r="13"/>
      <circle cx="752" cy="110" r="13"/>
      <circle cx="800" cy="118" r="14"/>
      <circle cx="848" cy="110" r="13"/>
      <circle cx="900" cy="96" r="13"/>
      <circle cx="800" cy="74" r="12"/>
    </g>
    <g fill="#fff3d0" opacity="0.3">
      <circle cx="700" cy="96" r="26"/>
      <circle cx="800" cy="118" r="30"/>
      <circle cx="900" cy="96" r="26"/>
    </g>
    <!-- hanging crystals -->
    <g fill="#e7c074" opacity="0.7">
      <rect x="746" y="124" width="6" height="26" rx="3"/>
      <rect x="797" y="132" width="6" height="30" rx="3"/>
      <rect x="848" y="124" width="6" height="26" rx="3"/>
    </g>
  </g>

  <!-- elegant set dining table (foreground center, kept lower/calm) -->
  <g>
    <ellipse cx="800" cy="838" rx="360" ry="40" fill="#000000" opacity="0.18"/>
    <!-- spotlight on table -->
    <ellipse cx="800" cy="690" rx="360" ry="120" fill="url(#reSpot)"/>
    <!-- tablecloth -->
    <path d="M470 690 h660 l60 150 h-780 z" fill="#fbf3e6"/>
    <ellipse cx="800" cy="690" rx="330" ry="46" fill="#ffffff"/>
    <ellipse cx="800" cy="690" rx="330" ry="46" fill="#f4c98e" opacity="0.12"/>
    <!-- plates -->
    <g>
      <ellipse cx="640" cy="690" rx="64" ry="20" fill="#ffffff"/>
      <ellipse cx="640" cy="688" rx="44" ry="13" fill="#f0e3cf"/>
      <ellipse cx="960" cy="690" rx="64" ry="20" fill="#ffffff"/>
      <ellipse cx="960" cy="688" rx="44" ry="13" fill="#f0e3cf"/>
      <ellipse cx="800" cy="698" rx="74" ry="22" fill="#ffffff"/>
      <ellipse cx="800" cy="696" rx="52" ry="15" fill="#f0e3cf"/>
    </g>
    <!-- candle / centerpiece -->
    <g>
      <rect x="792" y="612" width="16" height="60" rx="6" fill="#caa46a"/>
      <ellipse cx="800" cy="672" rx="26" ry="9" fill="#a87b48"/>
      <path d="M800 590 q14 16 0 30 q-14 -14 0 -30 z" fill="#ffcf6e"/>
      <ellipse cx="800" cy="600" rx="22" ry="26" fill="#ffe6a8" opacity="0.4"/>
    </g>
    <!-- two wine glasses -->
    <g>
      <path d="M700 638 q14 24 0 40 q-14 -16 0 -40 z" fill="#a8323f" opacity="0.7"/>
      <line x1="700" y1="678" x2="700" y2="700" stroke="#e9dcc4" stroke-width="3"/>
      <path d="M900 638 q14 24 0 40 q-14 -16 0 -40 z" fill="#a8323f" opacity="0.7"/>
      <line x1="900" y1="678" x2="900" y2="700" stroke="#e9dcc4" stroke-width="3"/>
    </g>
  </g>

  <!-- two slim potted accents flanking -->
  <g>
    <rect x="180" y="560" width="60" height="80" rx="8" fill="#caa46a"/>
    <path d="M210 560 q-50 -90 0 -160 q50 90 0 160 z" fill="#3f6b4a"/>
    <rect x="1360" y="560" width="60" height="80" rx="8" fill="#caa46a"/>
    <path d="M1390 560 q-50 -90 0 -160 q50 90 0 160 z" fill="#3f6b4a"/>
  </g>
</svg>
