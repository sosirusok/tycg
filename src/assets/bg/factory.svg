<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="fcWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dfe8ee"/>
      <stop offset="0.55" stop-color="#cdd9e1"/>
      <stop offset="1" stop-color="#b9c7d1"/>
    </linearGradient>
    <linearGradient id="fcFloor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#aab6bf"/>
      <stop offset="1" stop-color="#8b99a3"/>
    </linearGradient>
    <linearGradient id="fcWin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eaf6ff"/>
      <stop offset="1" stop-color="#cfe6f2"/>
    </linearGradient>
    <linearGradient id="fcSteel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9aa8b2"/>
      <stop offset="0.45" stop-color="#dfe7ec"/>
      <stop offset="0.55" stop-color="#eef3f6"/>
      <stop offset="1" stop-color="#9aa8b2"/>
    </linearGradient>
    <linearGradient id="fcTank" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b99a3"/>
      <stop offset="0.4" stop-color="#e3eaef"/>
      <stop offset="0.6" stop-color="#f2f6f8"/>
      <stop offset="1" stop-color="#8b99a3"/>
    </linearGradient>
    <linearGradient id="fcBelt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5b6670"/>
      <stop offset="1" stop-color="#3f4750"/>
    </linearGradient>
    <linearGradient id="fcBox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f2994a"/>
      <stop offset="1" stop-color="#e07b39"/>
    </linearGradient>
  </defs>

  <!-- cool steel wall -->
  <rect width="1600" height="900" fill="url(#fcWall)"/>
  <!-- wall panel seams -->
  <g stroke="#a6b3bc" stroke-width="3" opacity="0.5">
    <line x1="0" y1="170" x2="1600" y2="170"/>
    <line x1="0" y1="430" x2="1600" y2="430"/>
    <line x1="270" y1="0" x2="270" y2="560"/>
    <line x1="540" y1="0" x2="540" y2="560"/>
    <line x1="1060" y1="0" x2="1060" y2="560"/>
    <line x1="1330" y1="0" x2="1330" y2="560"/>
  </g>

  <!-- large industrial windows (back) -->
  <g>
    <rect x="600" y="90" width="540" height="280" rx="10" fill="#8b99a3"/>
    <rect x="612" y="102" width="516" height="256" rx="6" fill="url(#fcWin)"/>
    <g stroke="#7e8c96" stroke-width="8" opacity="0.7">
      <line x1="784" y1="102" x2="784" y2="358"/>
      <line x1="956" y1="102" x2="956" y2="358"/>
      <line x1="612" y1="230" x2="1128" y2="230"/>
    </g>
    <polygon points="640,102 760,102 660,358 612,358" fill="#ffffff" opacity="0.3"/>
  </g>

  <!-- ceiling pipes -->
  <g fill="#b6c2cb">
    <rect x="0" y="60" width="1600" height="18" rx="9"/>
    <rect x="0" y="100" width="1600" height="12" rx="6" opacity="0.7"/>
  </g>
  <g fill="#a6b3bc">
    <rect x="200" y="60" width="14" height="80" rx="6"/>
    <rect x="1380" y="60" width="14" height="80" rx="6"/>
  </g>
  <!-- caramel accent pipe -->
  <rect x="0" y="132" width="1600" height="10" rx="5" fill="#f2994a" opacity="0.85"/>

  <!-- floor -->
  <rect x="0" y="560" width="1600" height="340" fill="url(#fcFloor)"/>
  <rect x="0" y="560" width="1600" height="8" fill="#6f7d87"/>
  <!-- safety floor stripe (caramel) -->
  <rect x="0" y="600" width="1600" height="14" fill="#f2994a" opacity="0.8"/>
  <g stroke="#7e8c96" stroke-width="3" opacity="0.4">
    <line x1="0" y1="700" x2="1600" y2="700"/>
    <line x1="300" y1="568" x2="220" y2="900"/>
    <line x1="800" y1="568" x2="800" y2="900"/>
    <line x1="1300" y1="568" x2="1380" y2="900"/>
  </g>

  <!-- LEFT: big mixing tanks -->
  <g>
    <!-- tank 1 -->
    <ellipse cx="220" cy="600" rx="110" ry="22" fill="#000000" opacity="0.08"/>
    <rect x="120" y="250" width="200" height="350" rx="40" fill="url(#fcTank)"/>
    <ellipse cx="220" cy="250" rx="100" ry="34" fill="#eef3f6"/>
    <ellipse cx="220" cy="250" rx="100" ry="34" fill="#9aa8b2" opacity="0.2"/>
    <!-- dome lid -->
    <path d="M150 250 a70 56 0 0 1 140 0 z" fill="#cdd9e1"/>
    <rect x="206" y="180" width="28" height="20" rx="6" fill="#7e8c96"/>
    <!-- gauges -->
    <circle cx="180" cy="360" r="16" fill="#fff7ec"/>
    <circle cx="180" cy="360" r="16" fill="none" stroke="#7e8c96" stroke-width="3"/>
    <circle cx="260" cy="360" r="16" fill="#fff7ec"/>
    <circle cx="260" cy="360" r="16" fill="none" stroke="#7e8c96" stroke-width="3"/>
    <rect x="170" y="470" width="100" height="20" rx="8" fill="#f2994a" opacity="0.8"/>
    <!-- tank legs -->
    <rect x="150" y="588" width="16" height="30" fill="#7e8c96"/>
    <rect x="274" y="588" width="16" height="30" fill="#7e8c96"/>
  </g>
  <g>
    <!-- tank 2 (smaller, behind) -->
    <rect x="350" y="320" width="150" height="280" rx="30" fill="url(#fcTank)"/>
    <ellipse cx="425" cy="320" rx="75" ry="26" fill="#eef3f6"/>
    <path d="M375 320 a50 40 0 0 1 100 0 z" fill="#cdd9e1"/>
    <rect x="412" y="270" width="26" height="18" rx="6" fill="#7e8c96"/>
    <rect x="385" y="420" width="80" height="16" rx="8" fill="#f2994a" opacity="0.7"/>
  </g>
  <!-- connecting pipes between tanks -->
  <g fill="#b6c2cb">
    <rect x="316" y="300" width="50" height="14" rx="7"/>
    <rect x="316" y="420" width="50" height="14" rx="7"/>
  </g>

  <!-- RIGHT: machine block -->
  <g>
    <ellipse cx="1330" cy="600" rx="170" ry="24" fill="#000000" opacity="0.08"/>
    <rect x="1170" y="300" width="320" height="300" rx="20" fill="url(#fcSteel)"/>
    <rect x="1170" y="300" width="320" height="44" rx="14" fill="#7e8c96"/>
    <!-- control panel -->
    <rect x="1200" y="370" width="120" height="90" rx="10" fill="#2f3b44"/>
    <g fill="#5bbf7a"><circle cx="1224" cy="396" r="9"/></g>
    <g fill="#f2c94c"><circle cx="1252" cy="396" r="9"/></g>
    <g fill="#e85d6a"><circle cx="1280" cy="396" r="9"/></g>
    <rect x="1216" y="418" width="88" height="14" rx="7" fill="#5aa9e6" opacity="0.8"/>
    <rect x="1216" y="438" width="60" height="10" rx="5" fill="#9aa8b2"/>
    <!-- output chute over belt -->
    <path d="M1180 470 h120 l-30 70 h-60 z" fill="#9aa8b2"/>
    <rect x="1360" y="350" width="100" height="200" rx="12" fill="#cdd9e1"/>
    <circle cx="1410" cy="420" r="34" fill="#eef3f6"/>
    <circle cx="1410" cy="420" r="34" fill="none" stroke="#7e8c96" stroke-width="4"/>
    <rect x="1360" y="500" width="100" height="16" rx="8" fill="#f2994a" opacity="0.8"/>
  </g>

  <!-- conveyor belt across center-lower with boxes -->
  <g>
    <!-- belt frame -->
    <rect x="360" y="640" width="900" height="56" rx="14" fill="url(#fcBelt)"/>
    <rect x="360" y="640" width="900" height="10" rx="5" fill="#6e7a84"/>
    <!-- rollers -->
    <g fill="#aab6bf">
      <circle cx="396" cy="668" r="20"/>
      <circle cx="1224" cy="668" r="20"/>
    </g>
    <!-- belt segment lines -->
    <g stroke="#6e7a84" stroke-width="3" opacity="0.6">
      <line x1="470" y1="650" x2="470" y2="686"/>
      <line x1="600" y1="650" x2="600" y2="686"/>
      <line x1="730" y1="650" x2="730" y2="686"/>
      <line x1="860" y1="650" x2="860" y2="686"/>
      <line x1="990" y1="650" x2="990" y2="686"/>
      <line x1="1120" y1="650" x2="1120" y2="686"/>
    </g>
    <!-- belt legs -->
    <g fill="#5b6670">
      <rect x="420" y="696" width="16" height="60"/>
      <rect x="1184" y="696" width="16" height="60"/>
    </g>
    <!-- caramel cartons riding the belt -->
    <g>
      <rect x="470" y="588" width="80" height="56" rx="8" fill="url(#fcBox)"/>
      <rect x="470" y="588" width="80" height="14" rx="6" fill="#ffd9a0" opacity="0.5"/>
      <line x1="510" y1="588" x2="510" y2="644" stroke="#c9622b" stroke-width="3"/>

      <rect x="640" y="588" width="80" height="56" rx="8" fill="url(#fcBox)"/>
      <rect x="640" y="588" width="80" height="14" rx="6" fill="#ffd9a0" opacity="0.5"/>
      <line x1="680" y1="588" x2="680" y2="644" stroke="#c9622b" stroke-width="3"/>

      <rect x="810" y="588" width="80" height="56" rx="8" fill="url(#fcBox)"/>
      <rect x="810" y="588" width="80" height="14" rx="6" fill="#ffd9a0" opacity="0.5"/>
      <line x1="850" y1="588" x2="850" y2="644" stroke="#c9622b" stroke-width="3"/>

      <rect x="980" y="588" width="80" height="56" rx="8" fill="url(#fcBox)"/>
      <rect x="980" y="588" width="80" height="14" rx="6" fill="#ffd9a0" opacity="0.5"/>
      <line x1="1020" y1="588" x2="1020" y2="644" stroke="#c9622b" stroke-width="3"/>

      <rect x="1150" y="588" width="80" height="56" rx="8" fill="url(#fcBox)"/>
      <rect x="1150" y="588" width="80" height="14" rx="6" fill="#ffd9a0" opacity="0.5"/>
      <line x1="1190" y1="588" x2="1190" y2="644" stroke="#c9622b" stroke-width="3"/>
    </g>
  </g>

  <!-- subtle vertical pipes on far walls -->
  <g fill="#b6c2cb" opacity="0.8">
    <rect x="60" y="140" width="16" height="420" rx="8"/>
    <rect x="1540" y="140" width="16" height="420" rx="8"/>
  </g>

  <!-- soft cool light bloom near windows -->
  <ellipse cx="870" cy="230" rx="320" ry="160" fill="#ffffff" opacity="0.18"/>
</svg>
